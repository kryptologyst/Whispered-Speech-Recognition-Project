# Data configuration
_target_: src.data.whispered_speech.WhisperedSpeechDataModule

# Dataset settings
dataset_name: whispered_speech
data_dir: ${oc.env:DATA_DIR,data}
train_split: train
val_split: validation
test_split: test

# Audio preprocessing
sample_rate: 16000
max_duration: 20.0
min_duration: 0.5
normalize_audio: true
pre_emphasis: 0.97

# Feature extraction
feature_type: log_mel
n_fft: 1024
hop_length: 256
win_length: 1024
n_mels: 80
f_min: 0
f_max: 8000
apply_cmvn: true

# Data augmentation
use_augmentation: true
spec_augment:
  time_mask_param: 27
  freq_mask_param: 12
  num_time_masks: 2
  num_freq_masks: 2
speed_perturbation:
  min_speed: 0.9
  max_speed: 1.1
noise_injection:
  noise_factor: 0.01
  noise_type: gaussian

# Data loading
batch_size: 16
num_workers: 4
pin_memory: true
persistent_workers: true
