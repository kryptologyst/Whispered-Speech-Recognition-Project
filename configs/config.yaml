# @package _global_

defaults:
  - model: wav2vec2_conformer
  - data: whispered_speech
  - trainer: pytorch_lightning
  - _self_

# Experiment settings
experiment_name: whispered_speech_recognition
version: "1.0.0"
seed: 42

# Paths
data_dir: ${oc.env:DATA_DIR,data}
output_dir: ${oc.env:OUTPUT_DIR,outputs}
checkpoint_dir: ${output_dir}/checkpoints
log_dir: ${output_dir}/logs

# Device settings
device: auto  # auto, cpu, cuda, mps
num_workers: 4
pin_memory: true

# Logging
log_level: INFO
use_wandb: false
wandb_project: whispered-speech-recognition

# Privacy settings
anonymize_logs: true
remove_pii: true
